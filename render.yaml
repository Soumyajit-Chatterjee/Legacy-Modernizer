services:
  - type: web
    runtime: docker
    name: legacy-modernizer
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false # prompt for value in Render dashboard

